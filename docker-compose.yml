version: "3.9"

services:
  velora:
    build: .
    container_name: velora
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - velora_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  postgres:
    image: postgres:16-alpine
    container_name: velora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: velora
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-velora_secure_password}
      POSTGRES_DB: velora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - velora_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velora -d velora"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: velora_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - velora_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  velora_net:
    driver: bridge
